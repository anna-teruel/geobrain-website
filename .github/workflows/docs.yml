name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r docs/requirements.txt

      - name: Fetch example notebook from geobrain repo
        run: |
          mkdir -p docs/source/examples
          curl -sL -o docs/source/examples/demo_API.ipynb \
            https://raw.githubusercontent.com/anna-teruel/geobrain/rebranding/examples/demo_API.ipynb

      - name: Build Sphinx docs
        run: sphinx-build -b html docs/source docs/_build/html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
