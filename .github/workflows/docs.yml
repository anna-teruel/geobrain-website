name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r docs/requirements.txt

      - name: Fetch example notebook from geobrain repo
        run: |
          mkdir -p docs/source/examples
          curl -sL -o docs/source/examples/demo_API.ipynb \
            https://raw.githubusercontent.com/anna-teruel/geobrain/main/examples/demo_API.ipynb

      - name: Fetch user guide docs from geobrain repo
        run: |
          mkdir -p docs/source/_fetched
          raw_base=https://raw.githubusercontent.com/anna-teruel/geobrain/main
          blob_base=https://github.com/anna-teruel/geobrain/blob/main
          curl -sL -o docs/source/_fetched/dashboard_usage.md "$raw_base/docs/dashboard_usage.md"
          curl -sL -o docs/source/_fetched/filtering_and_coloring.md "$raw_base/docs/filtering_and_coloring.md"
          curl -sL -o docs/source/_fetched/score_definitions.md "$raw_base/docs/score_definitions.md"

          # These docs cross-link each other and link to source files in the
          # geobrain repo by relative path. Once merged into one page here,
          # doc-to-doc links become in-page anchors and source-file links
          # point at GitHub's rendered file view.
          sed -i \
            -e 's|](filtering_and_coloring.md)|](#filtering-coloring-rendered-slices)|g' \
            -e 's|](score_definitions.md)|](#understanding-scores)|g' \
            -e "s|](../README.md)|]($blob_base/README.md)|g" \
            -e "s|](../geobrain/app/assets/render.js)|]($blob_base/geobrain/app/assets/render.js)|g" \
            -e "s|](../geobrain/app/layout.py)|]($blob_base/geobrain/app/layout.py)|g" \
            -e "s|](../geobrain/app/callbacks.py)|]($blob_base/geobrain/app/callbacks.py)|g" \
            -e "s|](../geobrain/app/figure.py)|]($blob_base/geobrain/app/figure.py)|g" \
            docs/source/_fetched/dashboard_usage.md \
            docs/source/_fetched/filtering_and_coloring.md \
            docs/source/_fetched/score_definitions.md

      - name: Build Sphinx docs
        run: sphinx-build -b html docs/source docs/_build/html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
